<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Job Dashboard</title>
    <!-- Tailwind + Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      .geist-font {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="geist-font">
    <!doctype html>
    <html lang="en" data-theme="light">
      <head>
        <meta charset="UTF-8" />
        <title>Job Application Tracker</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Tailwind + DaisyUI -->
        <script src="https://cdn.tailwindcss.com"></script>
        <link
          href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
          rel="stylesheet"
        />
        <!-- Google font -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
          href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
          rel="stylesheet"
        />
        <style>
          .geist-font {
            font-family: "Geist", sans-serif;
          }
        </style>
      </head>

      <body class="bg-slate-100">
        <header class="max-w-5xl mx-auto p-4">
          <h1 class="text-3xl font-bold text-black my-6">
            Job Application Tracker
          </h1>
        </header>

        <div class="grid md:grid-cols-3 gap-4 mb-8 max-w-5xl mx-auto">
          <div class="card bg-base-100 drop-shadow-lg">
            <div class="card-body">
              <p>Total</p>
              <h2 id="totalCount" class="text-2xl font-bold">8</h2>
            </div>
          </div>

          <div class="card bg-base-100 drop-shadow-lg">
            <div class="card-body">
              <p>Interview</p>
              <h2 id="interviewCount" class="text-2xl text-green-500 font-bold">
                0
              </h2>
            </div>
          </div>

          <div class="card bg-base-100 drop-shadow-lg">
            <div class="card-body">
              <p>Rejected</p>
              <h2 id="rejectedCount" class="text-2xl text-red-500 font-bold">
                0
              </h2>
            </div>
          </div>
        </div>
        <hr class="mb-6 max-w-5xl mx-auto" />
        <div
          class="flex justify-between items-center max-w-5xl mx-auto mb-[70px]"
        >
          <h2 class="text-xl font-bold text-blue-900">Available Jobs</h2>
          <p id="tabCount">8 jobs</p>
        </div>

        <div class="flex gap-2 mb-6 max-w-5xl mx-auto">
          <button id="allTab" class="btn btn-info btn-sm">All</button>
          <button id="interviewTab" class="btn btn-outline btn-sm">
            Interview
          </button>
          <button id="rejectedTab" class="btn btn-outline btn-sm">
            Rejected
          </button>
        </div>
      </body>
    </html>
  </body>
</html>
